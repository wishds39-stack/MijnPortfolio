<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishudha | Contact</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/contact.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="./index.html">Home</a>
            <a href="./about.html">About</a>
            <a href="./work.html">Work</a>
            <a href="./contact.html" class="active">Contact</a>
        </div>
    </nav>

    <main class="content-container">
        <section class="contact-header">
            <h1>Contact met mij opnemen</h1>
            <p>Heb je een vraag of wil je samenwerken? Laat gerust een bericht achter.</p>
        </section>

        <section class="contact-info">
            <h2>Mijn Gegevens</h2>
            <p><strong>Locatie:</strong> Paramaribo, Suriname</p>
            <p><strong>Instituut:</strong> UNASAT</p>
            <p><strong>E-mail:</strong> student@unasat.sr</p>
        </section>

        <section class="contact-form-section">
            <h2>Stuur een bericht</h2>
            <form action="#" method="POST" class="portfolio-form">
                <div class="form-group">
                    <label for="name">Naam:</label>
                    <input type="text" id="name" name="name" required placeholder="Jouw Naam">
                </div>
                <div class="form-group">
                    <label for="email">E-mailadres:</label>
                    <input type="email" id="email" name="email" required placeholder="jouw@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Bericht:</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Typ hier je bericht..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Verzenden</button>
            </form>
        </section>
    </main>

</body>
</html>
